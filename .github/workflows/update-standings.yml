name: Update DGPT standings

on:
  schedule:
    - cron: '0 14 * * *'   # Every day at 9am ET (14:00 UTC)
  workflow_dispatch:         # Also lets you trigger it manually from GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch standings and schedule
        run: node fetch-standings.js
        working-directory: scripts

      - name: Commit updated data
        run: |
          git config user.name  "FrisbeeWorld Bot"
          git config user.email "bot@frisbee.world"
          git add data/standings.json data/schedule.json
          git diff --staged --quiet || git commit -m "data: auto-update $(date +'%Y-%m-%d')"
          git push
