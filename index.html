<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="DGPulse — DGPT standings, schedule, and player stats">
<title>DGPulse · DGPT Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8541A;
    --navy: #0f1120;
    --navy2: #181b2e;
    --navy3: #21253d;
    --card: #232842;
    --border: rgba(255,255,255,0.08);
    --text: #f0eeea;
    --muted: #8a8fa8;
    --green: #3ecf6e;
    --yellow: #f5c842;
    --font-d: 'Barlow Condensed', sans-serif;
    --font-b: 'Barlow', sans-serif;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--navy); }
  body { font-family: var(--font-b); background: var(--navy); color: var(--text); min-height: 100dvh; max-width: 480px; margin: 0 auto; overflow-x: hidden; }
  .header { background: var(--navy2); border-bottom: 1px solid var(--border); padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .logo { font-family: var(--font-d); font-size: 26px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .logo span { color: var(--orange); }
  .div-toggle { display: flex; background: rgba(255,255,255,0.06); border-radius: 20px; padding: 3px; gap: 2px; }
  .div-btn { padding: 5px 16px; border-radius: 16px; border: none; font-family: var(--font-d); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
  .div-btn.active { background: var(--orange); color: #fff; }
  .nav-tabs { display: flex; }
  .nav-tab { flex: 1; padding: 10px 4px 11px; text-align: center; font-family: var(--font-d); font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.18s; }
  .nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

  .data-bar { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; background: var(--navy2); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted); }
  .data-left { display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-ok { background: var(--green); }
  .dot-load { background: var(--orange); animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

  .content { padding: 12px 12px calc(80px + var(--safe-b)); display: flex; flex-direction: column; gap: 12px; }
  .view { display: none; flex-direction: column; gap: 12px; }
  .view.active { display: flex; animation: fadeIn 0.22s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none} }

  .section-label { font-family: var(--font-d); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: -4px; }
  .card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 14px 16px; overflow: hidden; }

  .next-card { background: var(--navy3); border: 1px solid rgba(232,84,26,0.3); border-radius: 16px; padding: 16px; position: relative; overflow: hidden; }
  .next-card::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at top left, rgba(232,84,26,0.12), transparent 70%); pointer-events:none; }
  .next-label { font-family:var(--font-d); font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--orange); margin-bottom:6px; }
  .next-tier { display:inline-block; font-family:var(--font-d); font-size:11px; font-weight:700; letter-spacing:1px; padding:3px 8px; border-radius:6px; background:rgba(232,84,26,0.15); border:1px solid rgba(232,84,26,0.35); color:var(--orange); margin-bottom:10px; }
  .next-name { font-family:var(--font-d); font-size:28px; font-weight:800; line-height:1.05; text-transform:uppercase; margin-bottom:4px; }
  .next-loc { font-size:13px; color:var(--muted); margin-bottom:14px; }
  .countdown { display:flex; gap:16px; }
  .cd-unit { text-align:center; }
  .cd-num { font-family:var(--font-d); font-size:36px; font-weight:800; color:var(--orange); line-height:1; }
  .cd-lbl { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:2px; }

  .standing-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
  .standing-row:last-child { border-bottom:none; }
  .player-tap { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .player-tap:last-child { border-bottom:none; }
  .player-tap:active { opacity:0.6; }
  .rank-num { font-family:var(--font-d); font-size:16px; font-weight:800; width:22px; text-align:center; color:var(--muted); flex-shrink:0; }
  .rank-num.gold{color:#f5c842} .rank-num.silver{color:#b0b8c8} .rank-num.bronze{color:#c8845a}
  .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:12px; font-weight:700; flex-shrink:0; }
  .player-col { flex:1; min-width:0; }
  .player-name { font-family:var(--font-d); font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
  .player-sub { font-size:11px; color:var(--muted); margin-top:1px; }
  .pts-col { text-align:right; flex-shrink:0; }
  .pts-main { font-family:var(--font-d); font-size:18px; font-weight:800; line-height:1; }
  .pts-gain { font-size:11px; color:var(--green); margin-top:1px; }
  .qual-pill { font-family:var(--font-d); font-size:10px; font-weight:700; padding:2px 6px; border-radius:5px; background:rgba(232,84,26,0.15); border:1px solid rgba(232,84,26,0.35); color:var(--orange); flex-shrink:0; }
  .chevron { color:var(--muted); font-size:18px; margin-left:auto; }

  .leader-wrap { display:flex; align-items:center; gap:14px; }
  .leader-av { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:18px; font-weight:800; flex-shrink:0; border:2px solid var(--orange); }
  .leader-name { font-family:var(--font-d); font-size:22px; font-weight:800; line-height:1.1; }
  .leader-sub { font-size:12px; color:var(--muted); margin-top:3px; }
  .leader-pts { margin-left:auto; text-align:right; flex-shrink:0; }
  .leader-pts-num { font-family:var(--font-d); font-size:32px; font-weight:800; color:var(--orange); line-height:1; }
  .leader-pts-lbl { font-size:11px; color:var(--muted); }

  .cal-row { display:flex; gap:12px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); }
  .cal-row:last-child { border-bottom:none; }
  .cal-date { text-align:center; min-width:38px; flex-shrink:0; }
  .cal-month { font-family:var(--font-d); font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .cal-day { font-family:var(--font-d); font-size:24px; font-weight:800; line-height:1.05; }
  .cal-info { flex:1; }
  .cal-name { font-family:var(--font-d); font-size:16px; font-weight:700; line-height:1.2; }
  .cal-loc { font-size:12px; color:var(--muted); margin-top:2px; }
  .cal-winner { font-size:11px; color:var(--green); margin-top:2px; }
  .cal-meta { display:flex; gap:6px; margin-top:5px; flex-wrap:wrap; }
  .pill { display:inline-block; font-family:var(--font-d); font-size:10px; font-weight:700; letter-spacing:0.5px; padding:2px 7px; border-radius:5px; }
  .pill-done { background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid var(--border); }
  .pill-next { background:rgba(62,207,110,0.12); color:var(--green); border:1px solid rgba(62,207,110,0.3); }
  .pill-major { background:rgba(232,84,26,0.12); color:var(--orange); border:1px solid rgba(232,84,26,0.3); }
  .pill-upcoming { background:rgba(255,255,255,0.04); color:var(--muted); border:1px solid var(--border); }
  .pill-champ { background:rgba(245,200,66,0.12); color:var(--yellow); border:1px solid rgba(245,200,66,0.3); }

  .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
  .stat-box { background:rgba(255,255,255,0.05); border-radius:10px; padding:10px 8px; text-align:center; }
  .stat-num { font-family:var(--font-d); font-size:22px; font-weight:800; }
  .stat-lbl { font-size:11px; color:var(--muted); margin-top:2px; }
  .sm-link { display:block; text-align:center; margin-top:12px; font-family:var(--font-d); font-size:13px; font-weight:700; color:var(--orange); text-decoration:none; padding:10px; border:1px solid rgba(232,84,26,0.3); border-radius:10px; background:rgba(232,84,26,0.06); }

  .loading { display:flex; align-items:center; justify-content:center; gap:10px; padding:28px; color:var(--muted); font-size:13px; }
  .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .source-note { text-align:center; font-size:11px; color:var(--muted); padding:4px 0; }
  .source-note a { color:var(--orange); text-decoration:none; }

  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--navy2); border-top:1px solid var(--border); display:flex; padding:8px 0 calc(8px + var(--safe-b)); z-index:100; backdrop-filter:blur(12px); }
  .bnav { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:4px 0; }
  .bnav:active { opacity:0.6; }
  .bnav-icon { font-size:20px; line-height:1; opacity:0.45; transition:opacity 0.2s; }
  .bnav-label { font-family:var(--font-d); font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--muted); transition:color 0.2s; }
  .bnav.active .bnav-icon { opacity:1; }
  .bnav.active .bnav-label { color:var(--orange); }
  ::-webkit-scrollbar { width:0; }
  @media(min-width:481px){ body{ box-shadow:0 0 0 1px var(--border); } }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">DG<span>Pulse</span></div>
    <div class="div-toggle">
      <button class="div-btn active" onclick="setDiv('MPO',this)">MPO</button>
      <button class="div-btn" onclick="setDiv('FPO',this)">FPO</button>
    </div>
  </div>
  <nav class="nav-tabs">
    <div class="nav-tab active" onclick="showView('home',this)">Home</div>
    <div class="nav-tab" onclick="showView('standings',this)">Standings</div>
    <div class="nav-tab" onclick="showView('calendar',this)">Calendar</div>
    <div class="nav-tab" onclick="showView('players',this)">Players</div>
  </nav>
</header>

<div class="data-bar">
  <div class="data-left">
    <div class="dot dot-load" id="dot"></div>
    <span id="data-msg">Loading...</span>
  </div>
  <span id="data-updated"></span>
</div>

<main class="content">

  <section class="view active" id="view-home">
    <div class="next-card" id="next-card">
      <div class="next-label">Up next</div>
      <div class="next-tier" id="next-tier">—</div>
      <div class="next-name" id="next-name">Loading...</div>
      <div class="next-loc" id="next-loc"></div>
      <div class="countdown">
        <div class="cd-unit"><div class="cd-num" id="cd-d">—</div><div class="cd-lbl">Days</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-h">—</div><div class="cd-lbl">Hrs</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-m">—</div><div class="cd-lbl">Min</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-s">—</div><div class="cd-lbl">Sec</div></div>
      </div>
    </div>
    <div class="section-label">Top 5</div>
    <div class="card" id="home-top5"><div class="loading"><div class="spinner"></div></div></div>
    <div class="source-note">Data: <a href="https://statmando.com" target="_blank">StatMando</a></div>
  </section>

  <section class="view" id="view-standings">
    <div class="section-label">Powerball DGPT · <span id="standings-div-lbl">MPO</span> world standings</div>
    <div class="card" id="full-standings"><div class="loading"><div class="spinner"></div></div></div>
    <div class="source-note"><a href="https://statmando.com/rankings/dgpt/mpo" target="_blank">statmando.com</a></div>
  </section>

  <section class="view" id="view-calendar">
    <div class="section-label">2026 DGPT season</div>
    <div class="card" id="cal-list"><div class="loading"><div class="spinner"></div></div></div>
    <div class="source-note"><a href="https://www.pdga.com/elite-series" target="_blank">PDGA Elite Series</a></div>
  </section>

  <section class="view" id="view-players">
    <div class="section-label">Player lookup · <span id="players-div-lbl">MPO</span></div>
    <div class="card" id="player-list"><div class="loading"><div class="spinner"></div></div></div>
    <div class="card" id="player-detail" style="display:none"></div>
  </section>

</main>

<nav class="bottom-nav">
  <div class="bnav active" onclick="showView('home',null,'b')"><div class="bnav-icon">⬡</div><div class="bnav-label">Home</div></div>
  <div class="bnav" onclick="showView('standings',null,'b')"><div class="bnav-icon">◈</div><div class="bnav-label">Standings</div></div>
  <div class="bnav" onclick="showView('calendar',null,'b')"><div class="bnav-icon">◷</div><div class="bnav-label">Calendar</div></div>
  <div class="bnav" onclick="showView('players',null,'b')"><div class="bnav-icon">◎</div><div class="bnav-label">Players</div></div>
</nav>

<script>
const AVATARS = [
  {bg:"rgba(232,84,26,0.18)",color:"#e8541a"},{bg:"rgba(59,139,212,0.18)",color:"#4d9ee8"},
  {bg:"rgba(62,207,110,0.18)",color:"#3ecf6e"},{bg:"rgba(162,90,220,0.18)",color:"#b06adc"},
  {bg:"rgba(245,200,66,0.18)",color:"#f5c842"},{bg:"rgba(232,84,120,0.18)",color:"#e85478"},
  {bg:"rgba(26,190,190,0.18)",color:"#1abebe"},{bg:"rgba(220,140,60,0.18)",color:"#dc8c3c"},
];
const av = i => AVATARS[i % AVATARS.length];
const ini = n => n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
const rc = r => r===1?"gold":r===2?"silver":r===3?"bronze":"";
const rnd = n => Math.round(n*10)/10;

let standings = null;
let schedule = null;
let currentDiv = "MPO";

// ── Load data from static files ───────────────────────────────
async function loadData() {
  try {
    const [sRes, cRes] = await Promise.all([
      fetch('data/standings.json'),
      fetch('data/schedule.json')
    ]);
    standings = await sRes.json();
    schedule  = await cRes.json();

    document.getElementById("dot").className = "dot dot-ok";
    document.getElementById("data-msg").textContent = `Updated ${standings.updated} · ${standings.note}`;
    document.getElementById("data-updated").textContent = `Week ${standings.week}`;

    renderAll();
    renderCalendar();
    buildCountdown();
  } catch(e) {
    document.getElementById("dot").className = "dot";
    document.getElementById("dot").style.background = "#e24b4a";
    document.getElementById("data-msg").textContent = "Could not load data — check your connection";
  }
}

// ── Countdown: find "next" event from schedule ────────────────
function buildCountdown() {
  if (!schedule) return;
  const next = schedule.events.find(e => e.status === "next");
  if (!next) return;

  document.getElementById("next-tier").textContent = next.tier;
  document.getElementById("next-name").textContent = next.name;
  document.getElementById("next-loc").textContent = next.loc;

  // Parse start date from dates string e.g. "Apr 9–12" → "Apr 9 2026"
  const startStr = next.dates.split("–")[0].trim();
  const target = new Date(`${startStr} ${schedule.season} 08:00:00`);

  function tick() {
    const diff = target - new Date();
    if (diff <= 0) {
      ["cd-d","cd-h","cd-m","cd-s"].forEach(id => document.getElementById(id).textContent = "0");
      return;
    }
    document.getElementById("cd-d").textContent = Math.floor(diff / 86400000);
    document.getElementById("cd-h").textContent = Math.floor((diff % 86400000) / 3600000);
    document.getElementById("cd-m").textContent = Math.floor((diff % 3600000) / 60000);
    document.getElementById("cd-s").textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,"0");
  }
  tick();
  setInterval(tick, 1000);
}

// ── Render helpers ────────────────────────────────────────────
function playerRow(p, i, clickable) {
  const a = av(i);
  const gain = p.pointsGain > 0 ? `<div class="pts-gain">+${rnd(p.pointsGain)}</div>` : "";
  if (clickable) return `
    <div class="player-tap" onclick="showPlayer(${i})">
      <div class="rank-num ${rc(p.rank)}">${p.rank}</div>
      <div class="avatar" style="background:${a.bg};color:${a.color}">${ini(p.name)}</div>
      <div class="player-col">
        <div class="player-name">${p.name}</div>
        <div class="player-sub">${p.wins}W · ${p.top10s} top-10 · ${p.starts} starts</div>
      </div>
      ${p.qualified ? '<div class="qual-pill">Q</div>' : ""}
      <div class="chevron">›</div>
    </div>`;
  return `
    <div class="standing-row">
      <div class="rank-num ${rc(p.rank)}">${p.rank}</div>
      <div class="avatar" style="background:${a.bg};color:${a.color}">${ini(p.name)}</div>
      <div class="player-col">
        <div class="player-name">${p.name}</div>
        <div class="player-sub">${p.wins}W · ${p.top10s} top-10</div>
      </div>
      ${p.qualified ? '<div class="qual-pill">Q</div>' : ""}
      <div class="pts-col">
        <div class="pts-main">${rnd(p.points)}</div>
        ${gain}
      </div>
    </div>`;
}

function renderLeader(d) {
  if (!d || !d.length) return;
  const p = d[0], a = av(0);
  document.getElementById("leader-card").innerHTML = `
    <div class="leader-wrap">
      <div class="leader-av" style="background:${a.bg};color:${a.color}">${ini(p.name)}</div>
      <div>
        <div class="leader-name">${p.name}</div>
        <div class="leader-sub">${p.wins} win${p.wins!==1?"s":""} · ${p.top10s} top-10s · ${p.starts} starts</div>
      </div>
      <div class="leader-pts">
        <div class="leader-pts-num">${rnd(p.points)}</div>
        <div class="leader-pts-lbl">points</div>
      </div>
    </div>`;
}

function renderAll() {
  if (!standings) return;
  const d = standings[currentDiv];
  renderLeader(d);
  document.getElementById("home-top5").innerHTML = d.slice(0,5).map((p,i) => playerRow(p,i,false)).join("");
  document.getElementById("full-standings").innerHTML = d.map((p,i) => playerRow(p,i,false)).join("");
  document.getElementById("player-list").innerHTML = d.map((p,i) => playerRow(p,i,true)).join("");
  document.getElementById("home-div-lbl").textContent = currentDiv;
  document.getElementById("standings-div-lbl").textContent = currentDiv;
  document.getElementById("players-div-lbl").textContent = currentDiv;
}

function renderCalendar() {
  if (!schedule) return;
  document.getElementById("cal-list").innerHTML = schedule.events.map(e => {
    let pills = "";
    const winner = currentDiv === "MPO" ? e.winner_mpo : e.winner_fpo;
    if (e.status==="done")      pills += `<span class="pill pill-done">Completed</span>`;
    else if (e.status==="next") pills += `<span class="pill pill-next">Up next</span>`;
    if (e.tier==="PDGA Major")       pills += `<span class="pill pill-major">Major</span>`;
    else if (e.tier==="Playoffs")    pills += `<span class="pill pill-major">Playoffs</span>`;
    else if (e.tier==="Championship") pills += `<span class="pill pill-champ">Championship</span>`;
    else if (e.status==="upcoming")  pills += `<span class="pill pill-upcoming">Upcoming</span>`;
    const winnerHtml = winner ? `<div class="cal-winner">Winner: ${winner}</div>` : "";
    return `
      <div class="cal-row">
        <div class="cal-date"><div class="cal-month">${e.month}</div><div class="cal-day">${e.day}</div></div>
        <div class="cal-info">
          <div class="cal-name">${e.name}</div>
          <div class="cal-loc">${e.loc}</div>
          ${winnerHtml}
          <div class="cal-meta">${pills}</div>
        </div>
      </div>`;
  }).join("");
}

function showPlayer(idx) {
  if (!standings) return;
  const p = standings[currentDiv][idx], a = av(idx);
  const det = document.getElementById("player-detail");
  det.style.display = "block";
  det.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div class="leader-av" style="background:${a.bg};color:${a.color}">${ini(p.name)}</div>
      <div>
        <div class="leader-name">${p.name}</div>
        <div class="leader-sub">Rank #${p.rank} · ${currentDiv} · ${p.qualified?"Qualified ✓":"Not qualified"}</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${rnd(p.points)}</div><div class="stat-lbl">Points</div></div>
      <div class="stat-box"><div class="stat-num">${p.wins}</div><div class="stat-lbl">Wins</div></div>
      <div class="stat-box"><div class="stat-num">${p.top10s}</div><div class="stat-lbl">Top 10s</div></div>
      <div class="stat-box"><div class="stat-num">${p.starts}</div><div class="stat-lbl">Starts</div></div>
      <div class="stat-box"><div class="stat-num">+${rnd(p.pointsGain)}</div><div class="stat-lbl">Last event</div></div>
      <div class="stat-box"><div class="stat-num">${p.rank}</div><div class="stat-lbl">World rank</div></div>
    </div>
    <a class="sm-link" href="https://statmando.com/player/${p.name.toLowerCase().replace(/\s+/g,"-")}/profile" target="_blank">Full profile on StatMando ↗</a>`;
  det.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

function setDiv(div, btn) {
  currentDiv = div;
  document.querySelectorAll(".div-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("player-detail").style.display = "none";
  renderAll();
  renderCalendar();
}

function showView(view, tabEl) {
  const views = ["home","standings","calendar","players"];
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-"+view).classList.add("active");
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".nav-tab")[views.indexOf(view)]?.classList.add("active");
  document.querySelectorAll(".bnav").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".bnav")[views.indexOf(view)]?.classList.add("active");
}

loadData();
</script>
</body>
</html>
